# Манифест приложения для Яндекс Игр
# См. документацию: https://yandex.ru/games/doc/manifest

manifest_version: 2
id: orca-clicker-game
name:
  ru: "Косатка Клик! 🐋"
  en: "Orca Clicker 🐋"
description:
  ru: "Залипательный кликер с кошкой! Кликни, прокачайся, собирай награды и стань лучшим!"
  en: "Addictive cat clicker! Click, upgrade, collect rewards and become the best!"
author:
  name: "NLP-Core-Team"
  url: "https://github.com/your-repo"
version: "1.0.0"
orientation: portrait
environment:
  player:
    cloud_save: true
    leaderboard: true
    advertising: true

# Иконки
icons:
  20: "icon.png"
  64: "icon.png"
  128: "icon.png"
  256: "icon.png"

# Скриншоты (добавьте после создания)
screenshots:
  portrait:
    720: "screenshot-portrait-720.jpg"
    1280: "screenshot-portrait-1280.jpg"

# Категории
categories:
  - casual
  - arcade

# Языки
supported_languages:
  - ru
  - en
