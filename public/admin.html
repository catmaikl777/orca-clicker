<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка Игры</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
    .container { max-width: 1400px; margin: 0 auto; }
    h1 { color: #4fc3f7; margin-bottom: 20px; }
    .login-form { max-width: 400px; margin: 100px auto; padding: 30px; background: #16213e; border-radius: 10px; }
    .login-form input { width: 100%; padding: 12px; margin: 10px 0; background: #0f3460; border: 1px solid #4fc3f7; color: #fff; border-radius: 5px; }
    .login-form button { width: 100%; padding: 12px; background: #4fc3f7; border: none; color: #1a1a2e; font-weight: bold; border-radius: 5px; cursor: pointer; }
    .login-form button:hover { background: #29b6f6; }
    .error { color: #f44336; margin: 10px 0; }
    .hidden { display: none; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: #16213e; padding: 20px; border-radius: 10px; text-align: center; }
    .stat-value { font-size: 2em; color: #4fc3f7; font-weight: bold; }
    .stat-label { color: #888; margin-top: 5px; }
    .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .toolbar input { padding: 10px; background: #16213e; border: 1px solid #4fc3f7; color: #fff; border-radius: 5px; }
    .toolbar button { padding: 10px 20px; background: #4fc3f7; border: none; color: #1a1a2e; font-weight: bold; border-radius: 5px; cursor: pointer; }
    .toolbar button:hover { background: #29b6f6; }
    .toolbar button.danger { background: #f44336; color: #fff; }
    .toolbar button.danger:hover { background: #d32f2f; }
    .players-table { width: 100%; border-collapse: collapse; background: #16213e; border-radius: 10px; overflow: hidden; }
    .players-table th, .players-table td { padding: 12px; text-align: left; border-bottom: 1px solid #0f3460; }
    .players-table th { background: #0f3460; color: #4fc3f7; }
    .players-table tr:hover { background: #1f4068; }
    .players-table tr.banned { background: #3d1a1a; }
    .players-table tr.banned td { color: #f44336; }
    .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; margin: 2px; }
    .btn-edit { background: #4caf50; color: #fff; }
    .btn-edit:hover { background: #45a049; }
    .btn-ban { background: #f44336; color: #fff; }
    .btn-ban:hover { background: #d32f2f; }
    .btn-unban { background: #ffc107; color: #000; }
    .btn-unban:hover { background: #ffca2c; }
    .btn-delete { background: #ff5722; color: #fff; }
    .btn-delete:hover { background: #e64a19; }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: #16213e; padding: 30px; border-radius: 10px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; }
    .modal h2 { color: #4fc3f7; margin-bottom: 20px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; color: #888; }
    .form-group input { width: 100%; padding: 10px; background: #0f3460; border: 1px solid #4fc3f7; color: #fff; border-radius: 5px; }
    .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
    .modal-buttons button { flex: 1; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    .btn-save { background: #4caf50; color: #fff; }
    .btn-save:hover { background: #45a049; }
    .btn-cancel { background: #666; color: #fff; }
    .btn-cancel:hover { background: #555; }
    .loading { text-align: center; padding: 40px; color: #888; }
    .ban-reason { color: #f44336; font-size: 12px; margin-top: 5px; }
  </style>
</head>
<body>
  <!-- Login Screen -->
  <div id="loginScreen" class="login-form">
    <h2 style="text-align: center; color: #4fc3f7;">🔐 Админка</h2>
    <input type="password" id="adminPassword" placeholder="Введите пароль администратора">
    <button onclick="login()">Войти</button>
    <div id="loginError" class="error hidden">Неверный пароль</div>
  </div>

  <!-- Main Admin Panel -->
  <div id="adminPanel" class="container hidden">
    <h1>🎮 Админка Игры</h1>
    
    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="totalPlayers">-</div>
        <div class="stat-label">Всего игроков</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalCoins">-</div>
        <div class="stat-label">Всего монет</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="bannedCount">-</div>
        <div class="stat-label">Забанено</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="Поиск по имени или ID..." oninput="searchPlayers()">
      <button onclick="loadPlayers()">🔄 Обновить</button>
      <button class="danger" onclick="showBulkEdit()">✏️ Редактировать выбранное</button>
    </div>

    <!-- Players Table -->
    <table class="players-table">
      <thead>
        <tr>
          <th><input type="checkbox" onchange="toggleAll(this)"></th>
          <th>ID</th>
          <th>Имя</th>
          <th>Монеты</th>
          <th>Всего монет</th>
          <th>Уровень</th>
          <th>Клик/сек</th>
          <th>Статус</th>
          <th>Действия</th>
        </tr>
      </thead>
      <tbody id="playersTableBody">
        <tr><td colspan="9" class="loading">Загрузка...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Edit Player Modal -->
  <div id="editModal" class="modal hidden">
    <div class="modal-content">
      <h2>✏️ Редактировать игрока</h2>
      <input type="hidden" id="editPlayerId">
      <div class="form-group">
        <label>Имя</label>
        <input type="text" id="editName" disabled>
      </div>
      <div class="form-group">
        <label>Монеты</label>
        <input type="number" id="editCoins">
      </div>
      <div class="form-group">
        <label>Всего монет</label>
        <input type="number" id="editTotalCoins">
      </div>
      <div class="form-group">
        <label>Уровень</label>
        <input type="number" id="editLevel">
      </div>
      <div class="form-group">
        <label>Монет за клик</label>
        <input type="number" id="editPerClick">
      </div>
      <div class="form-group">
        <label>Монет в секунду</label>
        <input type="number" id="editPerSecond">
      </div>
      <div class="form-group">
        <label>Клики</label>
        <input type="number" id="editClicks">
      </div>
      <div class="modal-buttons">
        <button class="btn-save" onclick="savePlayer()">Сохранить</button>
        <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      </div>
    </div>
  </div>

  <script>
    let API_TOKEN = '';
    let playersData = [];

    // Login
    function login() {
      const password = document.getElementById('adminPassword').value;
      API_TOKEN = password;
      
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('adminPanel').classList.remove('hidden');
      
      loadStats();
      loadPlayers();
    }

    // API Helper
    async function apiRequest(url, method = 'GET', body = null) {
      const options = {
        method,
        headers: {
          'Authorization': `Bearer ${API_TOKEN}`,
          'Content-Type': 'application/json'
        }
      };
      
      if (body) options.body = JSON.stringify(body);
      
      const response = await fetch(url, options);
      return response.json();
    }

    // Load Stats
    async function loadStats() {
      try {
        const stats = await apiRequest('/api/admin/stats');
        document.getElementById('totalPlayers').textContent = stats.totalPlayers || 0;
        document.getElementById('totalCoins').textContent = formatNumber(stats.totalCoins || 0);
      } catch (error) {
        console.error('Ошибка загрузки статистики:', error);
      }
    }

    // Load Players
    async function loadPlayers() {
      try {
        const players = await apiRequest('/api/admin/players');
        playersData = players;
        renderPlayers(players);
        
        // Count banned
        const banned = players.filter(p => p.banned_at).length;
        document.getElementById('bannedCount').textContent = banned;
      } catch (error) {
        console.error('Ошибка загрузки игроков:', error);
        alert('Ошибка: ' + error.error);
        location.reload();
      }
    }

    // Render Players
    function renderPlayers(players) {
      const tbody = document.getElementById('playersTableBody');
      tbody.innerHTML = '';
      
      players.forEach(player => {
        const tr = document.createElement('tr');
        if (player.banned_at) tr.classList.add('banned');
        
        tr.innerHTML = `
          <td><input type="checkbox" class="player-checkbox" data-id="${player.id}"></td>
          <td>${player.id.substring(0, 8)}...</td>
          <td>${player.name}</td>
          <td>${formatNumber(player.coins)}</td>
          <td>${formatNumber(player.total_coins)}</td>
          <td>${player.level}</td>
          <td>${player.per_click} / ${player.per_second}</td>
          <td>${player.banned_at ? '🔴 ЗАБАНЕН' : '🟢 Активен'}</td>
          <td>
            <button class="btn btn-edit" onclick="editPlayer('${player.id}')">✏️</button>
            ${player.banned_at 
              ? `<button class="btn btn-unban" onclick="unbanPlayer('${player.id}')">🔓</button>`
              : `<button class="btn btn-ban" onclick="banPlayer('${player.id}')">🔒</button>`
            }
            <button class="btn btn-delete" onclick="deletePlayer('${player.id}')">🗑️</button>
          </td>
        `;
        
        tbody.appendChild(tr);
      });
    }

    // Search
    function searchPlayers() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      if (!query) {
        renderPlayers(playersData);
        return;
      }
      
      const filtered = playersData.filter(p => 
        p.name.toLowerCase().includes(query) || 
        p.id.toLowerCase().includes(query)
      );
      renderPlayers(filtered);
    }

    // Edit Player
    function editPlayer(id) {
      const player = playersData.find(p => p.id === id);
      if (!player) return;
      
      document.getElementById('editPlayerId').value = player.id;
      document.getElementById('editName').value = player.name;
      document.getElementById('editCoins').value = player.coins;
      document.getElementById('editTotalCoins').value = player.total_coins;
      document.getElementById('editLevel').value = player.level;
      document.getElementById('editPerClick').value = player.per_click;
      document.getElementById('editPerSecond').value = player.per_second;
      document.getElementById('editClicks').value = player.clicks;
      
      document.getElementById('editModal').classList.remove('hidden');
    }

    // Save Player
    async function savePlayer() {
      const id = document.getElementById('editPlayerId').value;
      const data = {
        coins: parseInt(document.getElementById('editCoins').value),
        totalCoins: parseInt(document.getElementById('editTotalCoins').value),
        level: parseInt(document.getElementById('editLevel').value),
        perClick: parseInt(document.getElementById('editPerClick').value),
        perSecond: parseInt(document.getElementById('editPerSecond').value),
        clicks: parseInt(document.getElementById('editClicks').value)
      };
      
      try {
        const result = await apiRequest(`/api/admin/players/${id}`, 'PUT', data);
        alert(result.message || 'Сохранено!');
        closeModal();
        loadPlayers();
        loadStats();
      } catch (error) {
        alert('Ошибка: ' + error.error);
      }
    }

    // Ban Player
    async function banPlayer(id) {
      const reason = prompt('Причина бана:');
      if (!reason) return;
      
      try {
        const result = await apiRequest(`/api/admin/ban/${id}`, 'POST', { reason });
        alert(result.message);
        loadPlayers();
      } catch (error) {
        alert('Ошибка: ' + error.error);
      }
    }

    // Unban Player
    async function unbanPlayer(id) {
      if (!confirm('Разбанить игрока?')) return;
      
      try {
        const result = await apiRequest(`/api/admin/unban/${id}`, 'POST');
        alert(result.message);
        loadPlayers();
      } catch (error) {
        alert('Ошибка: ' + error.error);
      }
    }

    // Delete Player
    async function deletePlayer(id) {
      if (!confirm('Удалить игрока? Это нельзя отменить!')) return;
      
      try {
        const result = await apiRequest(`/api/admin/players/${id}`, 'DELETE');
        alert(result.message);
        loadPlayers();
      } catch (error) {
        alert('Ошибка: ' + error.error);
      }
    }

    // Close Modal
    function closeModal() {
      document.getElementById('editModal').classList.add('hidden');
    }

    // Toggle All Checkboxes
    function toggleAll(checkbox) {
      document.querySelectorAll('.player-checkbox').forEach(cb => {
        cb.checked = checkbox.checked;
      });
    }

    // Show Bulk Edit
    function showBulkEdit() {
      const selected = document.querySelectorAll('.player-checkbox:checked');
      if (selected.length === 0) {
        alert('Выберите игроков!');
        return;
      }
      
      const action = prompt(`Выбрано ${selected.length} игроков.\n1 - Добавить монеты\n2 - Установить уровень\n3 - Забанить\nВведите число:`);
      
      if (action === '1') {
        const amount = parseInt(prompt('Сколько монет добавить:'));
        if (!amount) return;
        
        selected.forEach(cb => {
          const player = playersData.find(p => p.id === cb.dataset.id);
          if (player) {
            player.coins += amount;
            player.total_coins += amount;
          }
        });
        loadPlayers();
      } else if (action === '2') {
        const level = parseInt(prompt('Установить уровень:'));
        if (!level) return;
        
        selected.forEach(cb => {
          const player = playersData.find(p => p.id === cb.dataset.id);
          if (player) player.level = level;
        });
        loadPlayers();
      } else if (action === '3') {
        const reason = prompt('Причина бана:');
        if (!reason) return;
        
        selected.forEach(async cb => {
          await apiRequest(`/api/admin/ban/${cb.dataset.id}`, 'POST', { reason });
        });
        loadPlayers();
      }
    }

    // Format Number
    function formatNumber(num) {
      if (num >= 1e12) return (num / 1e12).toFixed(2) + 'T';
      if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
      if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
      if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
      return num.toString();
    }

    // Enter key login
    document.getElementById('adminPassword').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
